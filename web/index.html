<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <!-- CUSTOM Expo Reset: Fixed to allow native browser scrolling -->
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }
      /* CRITICAL FIX: Changed from overflow:hidden to overflow:auto */
      /* Expo's default template blocks all body scrolling which breaks web layouts */
      body {
        overflow: auto !important;
        -webkit-overflow-scrolling: touch;
      }
      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }
    </style>
  </head>

  <body>
    <noscript>
      You need to enable JavaScript to run this app.
    </noscript>
    <div id="root"></div>
  </body>
</html>
